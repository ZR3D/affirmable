:root {

  --app-theme-color: #414754;

@font-face {font-family: 'Nunito'; font-style: normal; font-weight: 400; src: url('fonts/nunito-regular.woff2') format('woff2');}
*{box-sizing:border-box;}
body{font-family: 'Nunito', sans-serif; font-size: 13px; padding: 0; margin: 0; background-color: var(--app-theme-color);}
/* padding-bottom: env(safe-area-inset-bottom); */
select, input{border-radius: 4px; border:none; padding:0.33rem; background:#fff; margin-right:0.5rem; font-size: 12px;}
input{font-size: 12px;}
input[type=number]{width:3rem;}
.main-container{display:flex; justify-content: center; height: 100vh; align-items: center; transition: background 1s ease; background: var(--app-theme-color)}
.dark-mode-background-color{background: #414754;}
/* Modal */
.modal-backdrop {position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); display:none; align-items:center; justify-content:center; z-index: 1000;}
.modal {font-family:sans-serif; background: #f1f1f1; color:#123456; padding:2rem 1rem 2rem 2rem; border-radius:10px; max-width:400px; width:80%; box-shadow:0 10px 30px rgba(0,0,0,0.2); position: relative;}
.modal h2 {margin-top:0; font-family: 'Nunito'; font-weight:normal; font-size: 1.5rem;}
.modal .close {position:absolute; top:10px; right:14px; font-size:1.5rem; color:#999; cursor: pointer;}
.modal .close:hover {color:#000;}
.modal div{margin-bottom:10px;}
.modal-label{width:80px; display:inline-block; vertical-align: middle;}
.modal-start{background:none; box-shadow:none; padding:1rem; }
.button-modal-container{text-align: center; margin-top:20px;}
/* Button */
button {background:#4f7a9d; color:white; border:none; padding:0.4rem 0.6rem; border-radius:6px; cursor:pointer;}
button:hover {background: #5b778d;}
.modal .start-container{display:flex; justify-content:center; margin-bottom:0px; width:auto !important;}
.start-button{width: 280px; height:280px; border-radius: 50%; font-family:'Nunito'; font-size:2rem; border:20px solid #f1f1f1;}
.circle-background {  display:flex; background: #0ea5e9; transition: background 1s ease; cursor: pointer; width: 90vmin; height: 90vmin;border-radius: 50%; justify-content: center; align-items: center;}
.affirmation-text {font-family: 'Nunito', sans-serif; font-size: clamp(2rem, 14vmin, 6rem); color:#ffffff; opacity:0.5; text-align:center; user-select:none; padding: 20px; hyphens:auto;}
/* --- Toggle switch --- */
.switch {position:relative; display:inline-block; width:50px; height:24px; vertical-align:top;}
.switch input {opacity:0; width:0; height:0;}
.slider {position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:0.4s;  border-radius: 24px;}
.slider:before {position: absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:0.4s; border-radius:50%;}
input:checked + .slider {background-color: #4f7a9d;}
input:checked + .slider:before {transform: translateX(25px);}
/* Timer */
.timer-circle{width:1px; height:1px; border-radius:50%; background:none; opacity:0.7; border:1px solid #ffffff; display: none; position:fixed;}
.timer-container{position:fixed; top:0; left:0; height:100vh; width:100vw; display:flex; justify-content:center;  align-items:center; pointer-events: none;}
.timer-animation {
  opacity: 0.5;
  display: block;
  animation-timing-function: ease-out;
  animation-name: timer-animation-keyframes;
  animation-duration: 5s;
  animation-iteration-count: 5;
}
@keyframes timer-animation-keyframes {
  0% {width:1px; height:1px; opacity: 0.5; border-width:2px;}
  100% {width:900px; height:900px; opacity:0; border-width:20px;}
}
/* --- Toast --- */
.toast{font-family: sans-serif; z-index: 1100;  position: fixed;  bottom: 0px;  left: 0px;  width: 100%;  margin: 0px;  padding: 10px 20px;  color: #ffffff;  font-size: 0.9rem;  transition: opacity 0.3s ease;  opacity: 0;  pointer-events: none; background:#12345678;}
.toast.show {opacity: 1;  pointer-events: auto;}
.hidden, .modal .hidden{display:none;}

// --- Timer Functions ---
function startTimer(){
  closeModal();
  stopTimer();
  const minutes = Number(timerMinutesNumber.value);
  const ms = minutes * 1000 * 60;
  timerTimeout = setTimeout(playTimerAlarm, ms);
  showToast('Timer Started');
}

function stopTimer() {
  clearTimeout(timerTimeout);
  timerContainer.classList.add('hidden');
  timerCircle.classList.remove('timer-animation')
}

function playTimerAlarm() {
  timerContainer.classList.remove('hidden');
  timerCircle.classList.add('timer-animation');
  showToast('Timer Completed');
  const now = ctx.currentTime;
  const interval = 1;
  const freqId = [0,0,1,2,3,0,4,0];
  for(let i=0; i<7; i++){
    playTone(solfeggioFreqs[freqId[i]], now + (i * interval), 0.8, 'sine', 0, 0.8, true)
  }
}

function setAudio(){
  appData.freqIndex = getRandomIndex(solfeggioFreqs, appData.freqIndex);
  playTone(solfeggioFreqs[appData.freqIndex], ctx.currentTime, 8, appData.waveform, 0, 0.8);
}

// Sets appData properties based on modal form values
function setDataFromModal(){
  const audio = appData.audio;
  const darkMode = appData.darkMode;
  appData.audio = audioSwitch.checked;
  appData.voices = Number(voicesNumber.value);
  appData.voicesShape = voicesShapeSelect.value;
  appData.waveform = waveformSelect.value;
  appData.waveform2 = waveformSelect2.value;
  appData.darkMode = darkModeSwitch.checked;
  appData.messageType = messageTypeSelect.value;
  appData.duration = Number(durationNumber.value);
  appData.timerMinutes= Number(timerMinutesNumber.value);
  if((audio !== appData.audio) && appData.audio) setAudio();
  if(darkMode !== appData.darkMode) setThemeColor();
  filterMessageList();
  saveLocalStorage();
}

function setModalValues(){
  audioSwitch.checked = appData.audio;
  voicesNumber.value = appData.voices;
  voicesShapeSelect.value = appData.voicesShape;

// --- Helper Functions ---
function filterMessageList(){
  if(appData.messageType === 'all'){
    selectedMessages = messageList;
  }else{
    selectedMessages = messageList.filter(m => m.tags.includes(appData.messageType));
  }
}

function setIsMobile(){
  const ua = navigator.userAgent;
  isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(ua) || (navigator.maxTouchPoints > 0);
};

function getRandomIndex(list, lastIndex, uniqueOnly=true){
  // Select Random
  let index = Math.floor(Math.random() * list.length);
  // Is same as last, so add 1 and use modulus to keep in bounds of list
  if(index === lastIndex && uniqueOnly){
    index = (index+1) % list.length;
  }
  return index;
}

function getPrefix(){
  const messagePrefixes = selectedMessages[appData.msgIndex].prefixes;
  let prefix = prefixes[appData.prefixIndex]; //random from list
  // Has prefixes assigned
  if(messagePrefixes.length>0){
    const assignedPrefix = messagePrefixes[Math.floor(Math.random() * messagePrefixes.length)];
    //If assignedPrefix returns 'all' then use random from prefixes list above  else
    if(assignedPrefix!=='all'){
      prefix = assignedPrefix;
    }
  }
  return prefix;
}

function changeText(){
  const seconds = appData.duration;
  const duration = seconds * 1000;
  appData.msgIndex = getRandomIndex(selectedMessages, appData.msgIndex);
  appData.fillIndex = getRandomIndex(fill, appData.fillIndex);
  appData.freqIndex = getRandomIndex(solfeggioFreqs, appData.freqIndex);
  appData.prefixIndex = getRandomIndex(prefixes, appData.prefixIndex, false);
  //appData.msgIndex = selectedMessages.length-1; // For testing last
  // Prefix
  const prefix = getPrefix();
  // Message
  const message = selectedMessages[appData.msgIndex].message;
  affirmationText.innerHTML = `${prefix} ${message}`;
  // Color
  const fillColor = fill[appData.fillIndex];
  // Sound
  const frequency = solfeggioFreqs[appData.freqIndex];
  if(appData.voices===1){
    playTone(frequency, ctx.currentTime, seconds+4, appData.waveform, 0, 0.8);
  }else{
    playUnison(frequency, ctx.currentTime, seconds+4);
  }
  circleBackground.style.background = fillColor;
  // Loop
  const timeout = setTimeout(changeText, duration);
}

// --- Audio ---
const ctx = new (window.AudioContext || window.webkitAudioContext)();

const compressor = ctx.createDynamicsCompressor();
//const compset = {threshold:-24, knee:30, ratio:12, attack:0.003, release:0.25};
const compset = {threshold:-30, knee:40, ratio:4, attack:0.01, release:0.25};
compressor.threshold.setValueAtTime(compset.threshold, ctx.currentTime); // Point where compression kicks in
compressor.knee.setValueAtTime(compset.knee, ctx.currentTime);      // Softens the transition
compressor.ratio.setValueAtTime(compset.ratio, ctx.currentTime);     // How much it squashes the peaks
compressor.attack.setValueAtTime(compset.attack, ctx.currentTime); // Fast attack to catch peaks
compressor.release.setValueAtTime(compset.release, ctx.currentTime); // Smooth release

const lowBoost = ctx.createBiquadFilter();
lowBoost.type = "lowshelf";
lowBoost.frequency.setValueAtTime(250, ctx.currentTime);
lowBoost.gain.setValueAtTime(6, ctx.currentTime); // +6dB boost to lows

// Master gain to control overall volume
const master = ctx.createGain();
master.gain.value = 0.6;
master.connect(ctx.destination);

// Function to play a single tone with smooth fade in/out
function playTone(freq, startTime, duration, waveform, panValue=0, gainValue=0.8, isAlarm=false) {
  const ramp = Math.min(duration/2, 2);
  if((!appData.audio || !isVisible) && !isAlarm) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainValue, startTime + ramp); // fade in 2s
  gain.gain.linearRampToValueAtTime(0.0, startTime + duration - ramp); // fade out last 2s
  //create panner
  const pan = ctx.createStereoPanner();
  pan.pan.setValueAtTime(panValue, startTime);
  osc.frequency.value = freq;
  osc.type = waveform;
  if(isMobile){
    osc.connect(pan).connect(gain).connect(lowBoost).connect(compressor).connect(master);
  }else{
    //No low boost
    osc.connect(pan).connect(gain).connect(compressor).connect(master);
  }
  
  osc.start(startTime);
  osc.stop(startTime + duration);
  osc.onended = () => {
     pan.disconnect();
     gain.disconnect()
   }
}
// --- Multi Voice Unison ---
function unison(baseFreq, numVoices, shapeType, curve, oscillator1, oscillator2){
  const detuneAmount = 0.015; // ±1.5% range
  const gainValue = 0.8/numVoices;
  const voices = [];
  let shaped;
  // Generate voices
  for (let i = 0; i < numVoices; i++) {
    const norm = i / (numVoices - 1);
    const linear = (norm - 0.5) * 2; // -1 to +1
    const panValue = (i / (numVoices - 1)) * 2 - 1;
    if(shapeType === 'power'){
      // Exponential compression
      shaped = Math.sign(linear) * Math.pow(Math.abs(linear), curve);
    }else if(shapeType === 'tanh'){
      // Smooth S-curve: natural spacing, soft edges
      shaped = Math.tanh(linear * gainValue);
    }else if(shapeType === 'sinh'){
      // More aggressive spread near extremes
      shaped = Math.sinh(linear * gainValue) / Math.sinh(gainValue);
      // Simple non-linear easing (lighter center clustering)
    }else if(shapeType === 'cubic'){
      shaped = linear ** 3;
    }else{
      shaped = linear;
    }
    const detune = shaped * detuneAmount;
    const frequency = baseFreq * (1 + detune);
    const oscillatorType = (i % 2 === 0)? oscillator2:oscillator1;
    const phaseOffset = Math.random() / baseFreq; // up to one full cycle offset
    voices.push({frequency, gainValue, panValue, phaseOffset, oscillatorType});
  }
  return voices
}

function playUnison(freq, startTime, duration){
  const curve = 2.5;
  const voiceList = unison(freq, appData.voices, appData.voicesShape, curve, appData.waveform, appData.waveform2);
  voiceList.forEach(voice => {
    playTone(voice.frequency, startTime + voice.phaseOffset, duration, voice.oscillatorType, voice.panValue, voice.gainValue);
  });
}

// --- Modal ---
function openModal(id) {
  document.getElementById('modalBackdrop').style.display = 'flex';
  document.querySelectorAll('.modal-section').forEach(modalSection => {
    modalSection.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalBackdrop').style.display = 'none';
}

// --- Toast ---
function addLettersOneByOne(text, delay) {
  let index = 0;
  clearTimeout(letterTimeout);
  function addNextLetter() {
    if (index < text.length) {
      const letter = text.charAt(index);
      toast.textContent += letter;
      index++;
      let writeDelay = (letter===' ')? (delay*4):delay;
      letterTimeout = setTimeout(addNextLetter, writeDelay);
    }
  }
  addNextLetter();
}

function showToast(message, type = 'info', duration = 3000) {
  toast.textContent = '';
  addLettersOneByOne(message, 60);
  toast.className = `toast show ${type}`;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {toast.classList.remove('show');}, duration);
}

  localStorage.setItem(localStorageName, json);
}

}

function start(){
  isStarted = true;
  setTimeout(changeText, 4000);
  closeModal();
  modal.classList.remove('modal-start');
}

function loadLocalStorage(){
  const local = localStorage.getItem(localStorageName);
  if (local) {
    try {
      const data = JSON.parse(local);
      Object.assign(appData, data);
      console.log('Loading local data');
      onLoad();
    } catch (e) {
      saveLocalStorage();
      onLoad();
      console.log('Local data unavailable, using default');
    }
  }else{
    saveLocalStorage();
    onLoad();
  }
}
