<style>
:root {
  --app-theme-color: #E6ECFA;
  --app-modal-background: #f1f1f1;
  --app-modal-color: #123456;
  --app-button-background: #4f7a9d;
  --app-button-background-hover: #556978;
}
[data-theme="light"] {
  --app-theme-color: #E6ECFA;
  --app-modal-background: #f1f1f1;
  --app-modal-color: #123456;
  --app-button-background: #4f7a9d;
  --app-button-background-hover: #556978;
}
[data-theme="dark"] {
  --app-theme-color: #414754;
  --app-modal-background: #1a607c;
  --app-modal-color: #f1f1f1;
  --app-button-background: #1b354a;
  --app-button-background-hover: #2e475a;  
}
@font-face {font-family: 'Nunito'; font-style: normal; font-weight: 400; src: url('fonts/nunito-regular.woff2') format('woff2');}
*{box-sizing:border-box;}
body{font-family: 'Nunito', sans-serif; font-size: 13px; padding: 0; margin: 0; background-color: var(--app-theme-color);}
/* padding-bottom: env(safe-area-inset-bottom); */
select, input{border-radius: 4px; border:none; padding:0.33rem; background:#fff; margin-right:0.5rem; font-size: 12px; color: #333;}
input{font-size: 12px; color: #333;}
input[type=number]{width:3rem;}
.main-container{display:flex; justify-content: center; height: 100vh; align-items: center; transition: background 1s ease; background: var(--app-theme-color)}
.dark-mode-background-color{background: #414754;}
/*  --- Modal --- */
.modal-backdrop {position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); display:none; align-items:center; justify-content:center; z-index: 1000;}
.modal {font-family:sans-serif; background: var(--app-modal-background); color: var(--app-modal-color); padding:2rem 1rem 2rem 2rem; border-radius:10px; max-width:400px; width:80%; box-shadow:0 10px 30px rgba(0,0,0,0.2); position: relative;}
.modal h2 {margin-top:0; font-family: 'Nunito'; font-weight:normal; font-size: 1.5rem;}
.modal .close {position:absolute; top:10px; right:14px; font-size:1.5rem; color:#999; cursor: pointer;}
.modal .close:hover {color:#000;}
.modal div{margin-bottom:10px;}
.modal-label{width:80px; display:inline-block; vertical-align: middle;}
.modal-start{background:none; box-shadow:none; padding:1rem;}
.button-modal-container{text-align: center; margin-top:20px;}
/* --- Button --- */
button {background: var(--app-button-background); color:#f1f1f1; border:none; padding:0.4rem 0.6rem; border-radius:6px; cursor:pointer;}
button:hover {background: var(--app-button-background-hover);}
.modal .start-container{display:flex; justify-content:center; margin-bottom:0px; width:auto !important;}
.start-button{width: 280px; height:280px; border-radius: 50%; font-family:'Nunito'; font-size:2rem; border:20px solid #f1f1f1;}
.circle-background {display:flex; flex-direction:column; background: #0ea5e9; transition: background 1s ease; cursor: pointer; width: 90vmin; height: 90vmin;border-radius: 50%; justify-content: center; align-items: center;}
.affirmation-text {font-family: 'Nunito', sans-serif; font-size: clamp(2rem, 14vmin, 6rem); color:#ffffff; opacity:0.5; text-align:center; user-select:none; padding: 20px;} /* hyphens:auto; */
/* --- Toggle switch --- */
.switch {position:relative; display:inline-block; width:50px; height:24px; vertical-align:top;}
.switch input {opacity:0; width:0; height:0;}
.slider {position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:0.4s;  border-radius: 24px;}
.slider:before {position: absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:0.4s; border-radius:50%;}
input:checked + .slider {background-color: var(--app-button-background);}
input:checked + .slider:before {transform: translateX(25px);}
/* --- Timer --- */
.timer-circle{width:1px; height:1px; border-radius:50%; background:none; opacity:0.7; border:1px solid #ffffff; display: none; position:fixed;}
.timer-container{position:fixed; top:0; left:0; height:100vh; width:100vw; display:flex; justify-content:center;  align-items:center; pointer-events: none;}
.timer-animation {
  opacity: 0.5;
  display: block;
  animation-timing-function: ease-out;
  animation-name: timer-animation-keyframes;
  animation-duration: 5s;
  animation-iteration-count: 5;
}
@keyframes timer-animation-keyframes {
  0% {width:1px; height:1px; opacity: 0.5; border-width:2px;}
  100% {width:900px; height:900px; opacity:0; border-width:20px;}
}
.fade-in-word {opacity: 0; transition: opacity 0.9s ease;}
.fade-in-word.show {opacity: 0.8;}
/* --- Toast --- */
.toast{font-family: sans-serif; z-index: 1100;  position: fixed;  bottom: 0px;  left: 0px;  width: 100%;  margin: 0px;  padding: 10px 20px;  color: #ffffff;  font-size: 0.9rem;  transition: opacity 0.3s ease;  opacity: 0;  pointer-events: none; background:#12345678;}
.toast.show {opacity: 1;  pointer-events: auto;}
.hidden, .modal .hidden{display:none;}
.dots{margin-top: 70vmin; position: fixed; display:flex;}
.dots .dot-standard{background:#f1f1f1; border-radius:50%; width:2vmin; height:2vmin; margin:0vmin 1vmin; opacity:0.5; transition: opacity 1s ease;}
.dots .dot-active{opacity:0.8;}
</style>
</head>

// --- Timer Functions ---
function startTimer(){
  closeModal();
  stopTimer();
  const minutes = Number(timerMinutesNumber.value);
  const ms = minutes * 1000 * 60;
  timerTimeout = setTimeout(playTimerAlarm, ms);
  showToast('Timer Started');
}

function stopTimer() {
  clearTimeout(timerTimeout);
  timerContainer.classList.add('hidden');
  timerCircle.classList.remove('timer-animation')
}

function playTimerAlarm() {
  timerContainer.classList.remove('hidden');
  timerCircle.classList.add('timer-animation');
  showToast('Timer Completed');
  const now = ctx.currentTime;
  const interval = 1;
  const freqId = [0,0,1,2,3,0,4,0];
  for(let i=0; i<7; i++){
    playTone(solfeggioFreqs[freqId[i]], now + (i * interval), 0.8, 'sine', 0, 0.5, true);
  }
}

  appData.freqIndex = getRandomIndex(solfeggioFreqs, appData.freqIndex);

// --- Helper Functions ---
function formatDate(date) { //toLocalDateString
  date = date || new Date();
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function capitalizeFirstLetter(string) {
  return string.charAt(0).toUpperCase() + string.slice(1);
}

function getTags(){
  messageTypeSelect.innerHTML = '';
  dom.ctrl.tagSelect.innerHTML = '';
  const tagList = ['all'];
  appData.messages.forEach(message => {
    message.tags.forEach(tag => {
      if(!tagList.includes(tag)) tagList.push(tag);
    });
  });
  tagList.sort();
  tagList.forEach(tag => {
    const option = document.createElement('option');
    option.text = capitalizeFirstLetter(tag);
    option.value = tag;
    if(tag===appData.messageType) option.selected = true;
    messageTypeSelect.add(option);
    dom.ctrl.tagSelect.add(option.cloneNode(true));
  });
}

function filterMessageList(){
  if(appData.messageType === 'all'){
    selectedMessages = appData.messages;
  }else{
    selectedMessages = appData.messages.filter(m => m.tags.includes(appData.messageType));
  }
  if(appData.msgIndex >= selectedMessages.length-1) appData.msgIndex = 0;
  
  //Fix
  if(selectedMessages.length===0){
    //Add one entry if empty
    if(appData.messages.length===0) appData.messages.push({message:'tranquil', prefixes:['feel'], tags:['meditation']})
    //Set to all if no matches for tag in selectedMessages
    appData.messageType = 'all';
    filterMessageList();
  }
}

function setIsMobile(){

  isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(ua) || (navigator.maxTouchPoints > 0);

function getRandomIndex(list, lastIndex, uniqueOnly=true){
  // Select Random
  let index = Math.floor(Math.random() * list.length);
  // Is same as last, so add 1 and use modulus to keep in bounds of list
  if(index === lastIndex && uniqueOnly){
    index = (index+1) % list.length;
  }
  return index;
}

function updateDots(number, id){ 
  const dotElements = dots.querySelectorAll('.dot-standard');
  dotElements.forEach((dot,index) => {
    let classList 
    if(id===index){
      dot.classList.add('dot-active');
    }else{
      dot.classList.remove('dot-active');
    }
    // Hide all if single line or hide third if double
    if(index >= number || number===1){
      dot.classList.add('hidden');
    }else{
      dot.classList.remove('hidden');
    }
  });
}

function getCalculatedFontSize(){

  return parseFloat(style);
}

//Multi line keep same color, next message, count, display dots to show index
function getPrefix(){
  appData.prefixIndex = getRandomIndex(appData.prefixes, appData.prefixIndex, false);
  const messagePrefixes = selectedMessages[appData.msgIndex].prefixes;
  let prefix = appData.prefixes[appData.prefixIndex]; //random from list
  // Has prefixes assigned
  if(messagePrefixes.length>0){
    const assignedPrefix = messagePrefixes[Math.floor(Math.random() * messagePrefixes.length)];
    //If assignedPrefix returns 'all' then use random from prefixes list above  else
    if(assignedPrefix!=='all'){
      prefix = assignedPrefix;
    }
  }
  return prefix;
}

const msg = {messageList:[], index:0, length:0, isMultiline:false};

function setMsg(){
  if(appData.msgIndex > selectedMessages.length-1) appData.msgIndex = 0;
  const message = selectedMessages[appData.msgIndex];
  msg.messageList = message.message.split('|');
  msg.index = 0;
  msg.length = msg.messageList.length;
  //msg.isMultiline = (message.multiline)? true:false;
}

function getMessage(){
  let messageText;
  let changeColor = false;

  //if the message index is greater or equal to the length find next
  if(msg.index >= msg.length){
    appData.msgIndex = getRandomIndex(selectedMessages, appData.msgIndex);
    setMsg();
    changeColor = true;
  }
  messageText = msg.messageList[msg.index];
  msg.index++;
  // Multiline
  updateDots(msg.length, msg.index-1);
  //Add prefix if single line
  if(msg.length===1){
    const prefix = getPrefix();
    messageText = `${prefix} ${messageText}`;
  }
  return {messageText, changeColor, length:msg.length, index:msg.index}
}

function addWordsOneByOne(el, message, delay) {
  const words = message.split(' ');
  let index = 0;
  let spanList = [];
  // Add the paragraph first
  words.forEach(word => {
    const span = document.createElement('span');
    span.className = 'fade-in-word';
    span.textContent = word + ' ';
    spanList.push(span)
    el.appendChild(span);
  }); 
  // Then fade in
  clearTimeout(wordTimeout);
  function showNextWord() {
    if (index < spanList.length) {
      const span = spanList[index];
      span.classList.add('show')
      index++;
      wordTimeout = setTimeout(showNextWord, delay);
    }
  }
  setTimeout(showNextWord, delay);
}

  //affirmationText.innerHTML = message.messageText;
  addWordsOneByOne(affirmationText, message.messageText, 300)

    circleBackground.style.background = fillColor;
  }
  // Sound
  if(message.index===1){

    const frequency = solfeggioFreqs[appData.freqIndex];
    if(appData.voices===1){
      playTone(frequency, ctx.currentTime, seconds+overlapSeconds, appData.waveform, 0, toneGainDefault, false);
    }else{

    }
  }

  // Loop
  duration = duration/message.length;
  const timeout = setTimeout(changeText, duration);
}

// --- Audio ---
const ctx = new (window.AudioContext || window.webkitAudioContext)();
// Compressor
const compressor = ctx.createDynamicsCompressor();
//const compset = {threshold:-24, knee:30, ratio:12, attack:0.003, release:0.25};
const compset = {threshold:-30, knee:40, ratio:4, attack:0.01, release:0.25};
compressor.threshold.setValueAtTime(compset.threshold, ctx.currentTime); // Point where compression kicks in
compressor.knee.setValueAtTime(compset.knee, ctx.currentTime);      // Softens the transition
compressor.ratio.setValueAtTime(compset.ratio, ctx.currentTime);     // How much it squashes the peaks
compressor.attack.setValueAtTime(compset.attack, ctx.currentTime); // Fast attack to catch peaks
compressor.release.setValueAtTime(compset.release, ctx.currentTime); // Smooth release
// Filter Not used
const lowBoost = ctx.createBiquadFilter();
lowBoost.type = 'lowshelf';
lowBoost.frequency.setValueAtTime(250, ctx.currentTime);
lowBoost.gain.setValueAtTime(6, ctx.currentTime); // +6dB boost to lows
// Master gain to control overall volume
const master = ctx.createGain();
master.gain.value = masterGainDefault;
master.connect(ctx.destination);

// Function to play a single tone with smooth fade in/out
function playTone(freq, startTime, duration, waveform, panValue=0, gainValue=toneGainDefault, isAlarm=false) {
  const ramp = Math.min(duration/2, 2);
  if((!appData.audio) && !isAlarm) return;
  //if((!appData.audio || !isVisible) && !isAlarm) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainValue, startTime + ramp); // fade in 2s
  gain.gain.linearRampToValueAtTime(0.0, startTime + duration - ramp); // fade out last 2s
  //create panner
  const pan = ctx.createStereoPanner();
  pan.pan.setValueAtTime(panValue, startTime);
  osc.frequency.value = freq;
  osc.type = waveform;
  if(isMobile){
    //osc.connect(pan).connect(gain).connect(lowBoost).connect(compressor).connect(master);
    osc.connect(pan).connect(gain).connect(compressor).connect(master);
  }else{
    osc.connect(pan).connect(gain).connect(compressor).connect(master);
  }
  osc.start(startTime);
  osc.stop(startTime + duration);
  osc.onended = () => {
     pan.disconnect();
     gain.disconnect()
   }
}
// --- Multi Voice Unison ---
function unison(baseFreq, numVoices, shapeType, curve, oscillator1, oscillator2){
  const detuneAmount = 0.015; // ±1.5% range
  const gainValue = toneGainDefault/numVoices;
  const voices = [];
  let shaped;
  // Generate voices
  for (let i = 0; i < numVoices; i++) {
    const norm = i / (numVoices - 1);
    const linear = (norm - 0.5) * 2; // -1 to +1
    const panValue = (i / (numVoices - 1)) * 2 - 1;
    if(shapeType === 'power'){
      // Exponential compression
      shaped = Math.sign(linear) * Math.pow(Math.abs(linear), curve);
    }else if(shapeType === 'tanh'){
      // Smooth S-curve: natural spacing, soft edges
      shaped = Math.tanh(linear * gainValue);
    }else if(shapeType === 'sinh'){
      // More aggressive spread near extremes
      shaped = Math.sinh(linear * gainValue) / Math.sinh(gainValue);
      // Simple non-linear easing (lighter center clustering)
    }else if(shapeType === 'cubic'){
      shaped = linear ** 3;
    }else{
      shaped = linear;
    }
    const detune = shaped * detuneAmount;
    const frequency = baseFreq * (1 + detune);
    const oscillatorType = (i % 2 === 0)? oscillator2:oscillator1;
    const phaseOffset = Math.random() / baseFreq; // up to one full cycle offset
    voices.push({frequency, gainValue, panValue, phaseOffset, oscillatorType});
  }
  return voices
}

function playUnison(freq, startTime, duration){
  const curve = 2.5;
  const voiceList = unison(freq, appData.voices, appData.voicesShape, curve, appData.waveform, appData.waveform2);
  voiceList.forEach(voice => {
    playTone(voice.frequency, startTime + voice.phaseOffset, duration, voice.oscillatorType, voice.panValue, voice.gainValue, false);
  });
}

function openModal(id) {

  document.querySelectorAll('.modal-section').forEach(modalSection => {
    modalSection.classList.add('hidden');
  });

}

// --- Toast ---
function addLettersOneByOne(el, text, delay) {
  let index = 0;
  clearTimeout(letterTimeout);
  function addNextLetter() {
    if (index < text.length) {
      const letter = text.charAt(index);
      el.textContent += letter;
      index++;
      let writeDelay = (letter===' ')? (delay*4):delay;
      letterTimeout = setTimeout(addNextLetter, writeDelay);
    }
  }
  addNextLetter();
}

function showToast(message, type = 'info', duration = 3000) {
  toast.textContent = '';
  addLettersOneByOne(toast, message, 60);
  toast.className = `toast show ${type}`;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {toast.classList.remove('show');}, duration);
}
// --- Import Export ---
function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  const isoDate = formatDate(new Date());
  a.href = URL.createObjectURL(blob);
  a.download = `affirmable-${isoDate}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    console.log('reader');
    try {
      const data = JSON.parse(e.target.result);
      console.log(data, data.messageList)
      if(data.messageList){ //check for messageList
        Object.assign(appData, data);
        onLoad();
        saveLocalStorage();
        showToast('Imported!', 'success');
      }else{
        showToast('Sound Node data invalid format', 'error')
      }
    } catch (err) {
      showToast('Failed to load file: Invalid format.');
    }
  };
  reader.readAsText(file);
}

}

}

function start(){
  isStarted = true;
  setTimeout(changeText, 4000);
  closeModal();
  modal.classList.remove('modal-start');
}

function loadLocalStorage(){
  const local = localStorage.getItem(localStorageName);
  if (local) {
    try {
      const data = JSON.parse(local);
      Object.assign(appData, data);
      showToast('Loading local data');
      onLoad();
    } catch (e) {
      saveLocalStorage();
      onLoad();
      showToast('Local data unavailable, using default');
    }
  }else{
    saveLocalStorage();
    onLoad();
  }
}

  dom.ctrl.messageSelector.innerHTML = '<option value=""></option>';

  appData.messages.forEach((message,index) => {    
    if(tagFilter === 'all' || message.tags.includes(tagFilter)){
      const option = document.createElement('option');
      let optionText = message.prefix + message.message.split('|')[0];
      option.text = message.message.substring(0, 30).trim().replace(/\|/g,' ');

function updateMessageLine(messageList, index){
  if(!index) return;
  if(messageList.length>=index){
    dom.ctrl[`messageLine${index}Input`].value = messageList[index-1];
  }else{
    dom.ctrl[`messageLine${index}Input`].value = '';
  }
}

function messageSelectorChange(){
  const id = dom.ctrl.messageSelector.value;
  currentMessageId = id;
  const message = appData.messages[id];
  const messageList = message.message.split('|');
  updateMessageLine(messageList, 1);
  updateMessageLine(messageList, 2);
  updateMessageLine(messageList, 3);
  dom.ctrl.tagsInput.value = message.tags;
  dom.ctrl.prefixesInput.value = message.prefixes;
}

function getCommaSeperated(str){
  const newList = [];
  str = str.trim();
  if(str!==''){
    const strList = str.split(',');
    strList.forEach(item =>{
      item = item.trim().toLowerCase();
      if(item!=='') newList.push(item)
    });
  }
  return newList;
}

function saveMessage(){
  let message = '';
  for(let i=1; i<4; i++){
    const separator = (i===1)? '':'|';
    const line = dom.ctrl[`messageLine${i}Input`].value;
    if(line!=='') message += separator + line.toLowerCase();
  }
  const prefixes = getCommaSeperated(dom.ctrl.prefixesInput.value);
  const tags = getCommaSeperated(dom.ctrl.tagsInput.value); 
  const messageData = {message, prefixes, tags};
  console.log(messageData);  
  if(currentMessageId===-1){   
    appData.messages.push(messageData);
    filterMessageList();  
    showToast('Message Added!');
  }else{
    appData.messages[currentMessageId] = messageData; 
    showToast('Message Updated!'); 
  }
  populateMessageSelector();
  getTags();
  filterMessageList();
  saveLocalStorage(); 
}

function saveAsNewMessage(){
  currentMessageId = -1;
  saveMessage();
}

function deleteMessage(){
  appData.messages.splice(currentMessageId, 1);
  populateMessageSelector();
  getTags();
  filterMessageList();
  saveLocalStorage();
  showToast('Message Deleted');
}
