<style>
@font-face {font-family: 'Nunito'; font-style: normal; font-weight: 400; src: url('fonts/nunito-regular.woff2') format('woff2');}
*{box-sizing:border-box;}
body{font-family: 'Nunito', sans-serif; font-size: 13px; padding: 0; margin: 0; background: #E6ECFA;}
select, input{border-radius: 4px; border:none; padding:0.33rem; background:#fff; margin-right:0.5rem; font-size: 12px;}
input{font-size: 12px;}
input[type=number]{width:3rem;}
.main-container{display:flex; justify-content: center; height: 100vh; align-items: center; transition: background 1s ease;}
.dark-mode-background-color{background: #414754;}
/* Modal */
.modal-backdrop {position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); display:none; align-items:center; justify-content:center; z-index: 1000;}
.modal {font-family:sans-serif; background: #f1f1f1; color:#1d3f4c; padding:2rem 1rem 2rem 2rem; border-radius:10px; max-width:400px; width:80%; box-shadow:0 10px 30px rgba(0,0,0,0.2); position: relative;}
.modal h2 {margin-top:0;}
.modal .close {position:absolute; top:10px; right:14px; font-size:1.5rem; color:#999; cursor: pointer;}
.modal .close:hover {color:#000;}
.modal div{margin-bottom:10px;}
.modal-label{width:80px; display:inline-block; vertical-align: middle;}
.button-modal-container{text-align: center; margin-top:20px; }
/* Button */
button {background:#4f7a9d; color:white; border:none; padding:0.4rem 0.6rem; border-radius:6px; cursor:pointer;}
button:hover {background: #5b778d;}
.start-container{display:flex; justify-content: center;}
.start-button{width: 200px; height:200px; border-radius: 50%; font-family:'Nunito'; font-size:2rem;}
.circle-background {  display:flex; background: #0ea5e9; transition: background 1s ease; cursor: pointer;
  width: 90vmin;
  height: 90vmin;
  border-radius: 50%; justify-content: center; align-items: center;}
.affirmation-text {font-family: 'Nunito', sans-serif; font-size: clamp(2rem, 14vmin, 6rem); color:#ffffff; opacity:0.5; text-align:center; user-select:none; padding: 20px;}
/* Toggle switch */
.switch {position:relative; display:inline-block; width:50px; height:24px; vertical-align:top;}
.switch input {opacity:0; width:0; height:0;}
.slider {position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:0.4s;  border-radius: 24px;}
.slider:before {position: absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:0.4s; border-radius:50%;}
input:checked + .slider {background-color: #4f7a9d;}
input:checked + .slider:before {transform: translateX(25px);}
/* Timer */
.timer-circle{width:1px; height:1px; border-radius:50%; background:none; opacity:0.7; border:1px solid #ffffff; display: none;}
.timer-container{position:fixed; top:0; left:0; height:100vh; width:100vw; display:flex; justify-content:center;  align-items:center; pointer-events: none;}
.timer-animation {
  opacity: 0.5;
  display: block;
  animation-timing-function: ease-out;
  animation-name: timer-animation-keyframes;
  animation-duration: 5s;
  animation-iteration-count: 5;
}
@keyframes timer-animation-keyframes {
  0% {width:1px; height:1px; opacity: 0.5; border-width:2px;}
  100% {width:100vw; height:100vw; opacity: 0; border-width:20px;}
}
.hidden{display:none;}

// --- Timer Functions ---
function startTimer(){
  closeModal();
  stopTimer();
  const minutes = Number(timerMinutesNumber.value);
  const ms = minutes * 1000 * 60;
  timerTimeout = setTimeout(playTimerAlarm, ms);
}

function stopTimer() {
  clearTimeout(timerTimeout);
  timerContainer.classList.add('hidden');
  timerCircle.classList.remove('timer-animation')
}

function playTimerAlarm() {
  timerContainer.classList.remove('hidden');

function setAudio(){

// --- Helper Functions ---
function getRandomIndex(list, lastIndex, uniqueOnly=true){
  // Select Random
  let index = Math.floor(Math.random() * list.length);
  // Is same as last, so add 1 and use modulus to keep in bounds of list
  if(index === lastIndex && uniqueOnly){
    index = (index+1) % list.length;
  }
  return index;
}

function getPrefix(){
  const messagePrefixes = messageList[appData.msgIndex].prefixes;
  let prefix = prefixes[appData.prefixIndex];
  if(messagePrefixes.length>0){
    prefix = messagePrefixes[Math.floor(Math.random() * messagePrefixes.length)];
  }
  return prefix;
}

function changeText(){
  const seconds = appData.duration;
  const duration = seconds * 1000;
  appData.msgIndex = getRandomIndex(messageList, appData.msgIndex);
  appData.fillIndex = getRandomIndex(fill, appData.fillIndex);
  appData.freqIndex = getRandomIndex(solfeggioFreqs, appData.freqIndex);
  appData.prefixIndex = getRandomIndex(prefixes, appData.prefixIndex, false);
  //appData.msgIndex = messageList.length-1; // For testing last
  // Prefix
  const prefix = getPrefix();
  // Message
  const message = messageList[appData.msgIndex].message;
  affirmationText.innerHTML = `${prefix} ${message}`;
  // Color
  const fillColor = fill[appData.fillIndex];
  // Sound
  const frequency = solfeggioFreqs[appData.freqIndex];
  if(appData.voices===1){
    playTone(frequency, ctx.currentTime, seconds+4, appData.waveform, 0, 0.8);
  }else{
    playUnison(frequency, ctx.currentTime, seconds+4);
  }
  circleBackground.style.background = fillColor;
  // Loop
  const timeout = setTimeout(changeText, duration);
}

// --- Audio ---
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// Master gain to control overall volume
const master = ctx.createGain();
master.gain.value = 0.05;
master.connect(ctx.destination);

// Function to play a single tone with smooth fade in/out
function playTone(freq, startTime, duration, waveform, panValue=0, gainValue=0.8) {
  const ramp = Math.min(duration/2, 2);
  if(!appData.audio) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainValue, startTime + ramp); // fade in 2s
  gain.gain.linearRampToValueAtTime(0.0, startTime + duration - ramp); // fade out last 2s
  //create panner
  const pan = ctx.createStereoPanner();
  pan.pan.setValueAtTime(panValue, startTime);
  osc.frequency.value = freq;
  osc.type = waveform;
  osc.connect(pan).connect(gain).connect(master);
  osc.start(startTime);
  osc.stop(startTime + duration);
  osc.onended = () => {
     pan.disconnect();
     gain.disconnect()
   }
}
// --- Multi Voice Unison ---
function unison(baseFreq, numVoices, shapeType, curve, oscillator1, oscillator2){
  const detuneAmount = 0.015; // ±1.5% range
  const gainValue = 0.8/numVoices;
  const voices = [];
  let shaped;
  // Generate voices
  for (let i = 0; i < numVoices; i++) {
    const norm = i / (numVoices - 1);
    const linear = (norm - 0.5) * 2; // -1 to +1
    const panValue = (i / (numVoices - 1)) * 2 - 1;
    if(shapeType === 'power'){
      // Exponential compression
      shaped = Math.sign(linear) * Math.pow(Math.abs(linear), curve);
    }else if(shapeType === 'tanh'){
      // Smooth S-curve: natural spacing, soft edges
      shaped = Math.tanh(linear * gainValue);
    }else if(shapeType === 'sinh'){
      // More aggressive spread near extremes
      shaped = Math.sinh(linear * gainValue) / Math.sinh(gainValue);
      // Simple non-linear easing (lighter center clustering)
    }else if(shapeType === 'cubic'){
      shaped = linear ** 3;
    }else{
      shaped = linear;
    }
    const detune = shaped * detuneAmount;
    const frequency = baseFreq * (1 + detune);
    const oscillatorType = (i % 2 === 0)? oscillator2:oscillator1;
    const phaseOffset = Math.random() / baseFreq; // up to one full cycle offset
    voices.push({frequency, gainValue, panValue, phaseOffset, oscillatorType});
  }
  return voices
}

function playUnison(freq, startTime, duration){
  const curve = 2.5;
  const voiceList = unison(freq, appData.voices, appData.voicesShape, curve, appData.waveform, appData.waveform2);
  voiceList.forEach(voice => {
    playTone(voice.frequency, startTime + voice.phaseOffset, duration, voice.oscillatorType, voice.panValue, voice.gainValue);
  });
}

// --- Modal ---
function openModal(id) {
  document.getElementById('modalBackdrop').style.display = 'flex';
  document.querySelectorAll('.modal-section').forEach(modalSection => {
    modalSection.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalBackdrop').style.display = 'none';
}

// --- localStorage ---
function saveLocalStorage(){
  const json = JSON.stringify(appData);
  localStorage.setItem(localStorageName, json);
}

  setModalValues();  
  openModal('startModel');
}

// Begin button as audio requires a user gesture
function start(){
  started = true;
  setTimeout(changeText, 4000);
  closeModal();
}

function loadLocalStorage(){
  const local = localStorage.getItem(localStorageName);
  if (local) {
    try {
      const data = JSON.parse(local);
      Object.assign(appData, data);
      console.log('Loading local data');
      onLoad();
    } catch (e) {
      saveLocalStorage();
      onLoad();
      console.log('Local data unavailable, using default');
    }
  }else{
    saveLocalStorage();
    onLoad();
  }
}

function init(){
  loadLocalStorage();
}
